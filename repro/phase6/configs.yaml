# 精简配置：磁盘仅 CD_DIDI / SZ_DIDI；其余实验指标见 results/*.csv
variants:
  mini:
    ckpt: OpenCity-mini.pth
    embed_dim: 128
    skip_dim: 128
    enc_depth: 3
    batch_size: 8
  base:
    ckpt: OpenCity-base.pth
    embed_dim: 256
    skip_dim: 256
    enc_depth: 3
    batch_size: 8
  plus:
    ckpt: OpenCity-plus.pth
    embed_dim: 512
    skip_dim: 512
    enc_depth: 6
    batch_size: 2

local_datasets: [CD_DIDI, SZ_DIDI]

table1_datasets: [CAD3, CAD5, PEMS07M, TrafficSH, CHI_TAXI, NYC_BIKE-3]
table2_supervised_datasets: [CAD8-1, CAD8-2, CAD12-2, PEMS_BAY, NYC_TAXI]
scaling:
  datasets: [PEMS07M, METR_LA, PEMS_BAY, CAD3, PEMS04, NYC_TAXI]
  variants: [mini, base, plus]
fast_adapt:
  datasets: [CD_DIDI, SZ_DIDI]
  variants: [mini, base, plus]
  finetune_epochs: 3

ablation:
  datasets: [CAD3, NYC_BIKE-3]
  variants: [full, minus_DTP, minus_PTTM, minus_SDM, minus_STC]

