variants:
  mini:
    ckpt: OpenCity-mini.pth
    embed_dim: 128
    skip_dim: 128
    enc_depth: 3
    batch_size: 8
  base:
    ckpt: OpenCity-base.pth
    embed_dim: 256
    skip_dim: 256
    enc_depth: 3
    batch_size: 8
  plus:
    ckpt: OpenCity-plus.pth
    embed_dim: 512
    skip_dim: 512
    enc_depth: 6
    batch_size: 2

lora_adapt:
  datasets: [CD_DIDI, SZ_DIDI]
  variants: [mini, base, plus]
  lora_ranks: [8, 16, 24]
  finetune_epochs: 3

fast_adapt_csv: repro/results/phase6/fast_adapt_full.csv
